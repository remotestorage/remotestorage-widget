<div class="remotestorage-widget-modal-backdrop"></div>

<!--
  rs-state-initial
  rs-state-choose
  rs-state-sign-in
  rs-state-connected
  rs-state-error

  rs-offline
  rs-closed
  rs-modal
  rs-floating        - TODO - will make it fixed in the right corner
-->

<!-- RS WIDGET, a class named rs-state-<state> indicates its current state -->
<div class="rs-widget rs-state-initial">

  <div class="rs-widget-icon">
    <svg class="rs-main-logo" id="rs-main-logo-remotestorage" xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="70.9" height="81.9" fill-rule="evenodd" clip-rule="evenodd" image-rendering="optimizeQuality" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" viewBox="0 0 739 853">
      <path d="M370 754 0 542v98l185 107 185 106 184-106 185-107V378l-86 49-283 162L86 427v-66l99 57 185 106 184-106 99-57 86-50v-98L554 107 370 0 185 107 58 180l86 50 84-49 142-81 141 81 141 82-282 162L87 263 0 213v263l86 49 99 57 185 107 184-107 99-57v67z" class="rs-logo-shape"/>
    </svg>
    <svg class="rs-main-logo" id="rs-main-logo-dropbox" width="100%" height="100%" viewBox="0 0 32 32" style="fill: #0061fe">
      <path d="M8 2.4l8 5.1-8 5.1-8-5.1 8-5.1zm16 0l8 5.1-8 5.1-8-5.1 8-5.1zM0 17.7l8-5.1 8 5.1-8 5.1-8-5.1zm24-5.1l8 5.1-8 5.1-8-5.1 8-5.1zM8 24.5l8-5.1 8 5.1-8 5.1-8-5.1z"></path>
    </svg>
    <svg class="rs-main-logo" id="rs-main-logo-googledrive" width="100%" height="100%"  viewBox="0 0 32 32" style="fill: #0061fe">
      <path d="M8 2.4l8 5.1-8 5.1-8-5.1 8-5.1zm16 0l8 5.1-8 5.1-8-5.1 8-5.1zM0 17.7l8-5.1 8 5.1-8 5.1-8-5.1zm24-5.1l8 5.1-8 5.1-8-5.1 8-5.1zM8 24.5l8-5.1 8 5.1-8 5.1-8-5.1z"></path>
    </svg>
  </div>

  <div class="rs-box rs-box-initial" aria-hidden="false">
    <h3 class="rs-small-headline">Connect your storage</h3>
    <span class="rs-sub-headline">To sync data with your account</span>
  </div>

  <div class="rs-box rs-box-connected" aria-hidden="true">
    <div class="rs-connected-text">
      <h1 class="rs-user rs-small-headline">user@provider.com</h1>
      <span class="rs-sub-headline">Connected</span>
    </div>
    <div class="rs-connected-buttons">
      <button class="rs-button rs-button-small rs-sync" title="Sync now">
        <svg class="rs-icon rs-loop-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
          fill="transparent" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 11a8.1 8.1 0 0 0 -15.5 -2m-.5 -4v4h4" />
          <path d="M4 13a8.1 8.1 0 0 0 15.5 2m.5 4v-4h-4" />
        </svg>
      </button>
      <button class="rs-button rs-button-small rs-disconnect" title="Disconnect">
        <svg class="rs-icon rs-power-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M7 6a7.75 7.75 0 1 0 10 0" />
          <path d="M12 4l0 8" />
        </svg>
      </button>
    </div>
  </div>

  <div class="rs-box rs-box-error" aria-hidden="true">
    <div class="rs-error-message"></div>
    <div class="rs-error-buttons">
      <a href="#" class="rs-reconnect rs-hidden">Renew</a>
      <button class="rs-button rs-button-small rs-disconnect" title="Disconnect">
        <svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" class="rs-icon rs-power-icon" viewBox="0 0 512 512">
          <path d="M256 256c-18 0-32-14-32-32V64a32 32 0 1 1 64 0v160c0 18-14 32-32 32"/>
          <path d="M379 69q-8-5-17-5a32 32 0 0 0-16 60q12 8 23 19a159 159 0 0 1 0 226 159 159 0 0 1-226 0 159 159 0 0 1 0-226l27-22a31 31 0 0 0 12-25 32 32 0 0 0-49-27 224 224 0 1 0 246 0"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="rs-box rs-box-choose" aria-hidden="true">
    <div class="rs-content">
      <h1 class="rs-big-headline">Connect your storage</h1>
      <p class="rs-short-desc">
        This app allows you to sync data with a
        <a class="rs-help" href="https://remotestorage.io/" target="_blank" rel="noopener">storage provider of your choice</a>.
      </p>
      <div class="rs-button-wrap">
        <button class="rs-button rs-button-big rs-choose-rs">
          <svg class="rs-logo" id="rs-main-logo-remotestorage" xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="70.9" height="81.9" fill-rule="evenodd" clip-rule="evenodd" image-rendering="optimizeQuality" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" viewBox="0 0 739 853">
            <path d="M370 754 0 542v98l185 107 185 106 184-106 185-107V378l-86 49-283 162L86 427v-66l99 57 185 106 184-106 99-57 86-50v-98L554 107 370 0 185 107 58 180l86 50 84-49 142-81 141 81 141 82-282 162L87 263 0 213v263l86 49 99 57 185 107 184-107 99-57v67z" class="rs-logo-shape"/>
          </svg>
          <div>RemoteStorage</div>
        </button>
        <button class="rs-button rs-button-big rs-choose-dropbox">
          <svg class="dropbox-logo" width="100%" height="100%" viewBox="0 0 32 32" style="fill: #0061fe">
            <path d="M8 2.4l8 5.1-8 5.1-8-5.1 8-5.1zm16 0l8 5.1-8 5.1-8-5.1 8-5.1zM0 17.7l8-5.1 8 5.1-8 5.1-8-5.1zm24-5.1l8 5.1-8 5.1-8-5.1 8-5.1zM8 24.5l8-5.1 8 5.1-8 5.1-8-5.1z"></path>
          </svg>
          <div>Dropbox</div>
        </button>
        <button class="rs-button rs-button-big rs-choose-googledrive">
          <svg class="googledrive-logo" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 87.3 78">
            <path d="m6.6 66.85 3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3l13.75-23.8h-27.5c0 1.55.4 3.1 1.2 4.5z" fill="#0066da"/>
            <path d="m43.65 25-13.75-23.8c-1.35.8-2.5 1.9-3.3 3.3l-25.4 44a9.06 9.06 0 0 0 -1.2 4.5h27.5z" fill="#00ac47"/>
            <path d="m73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75 7.65-13.25c.8-1.4 1.2-2.95 1.2-4.5h-27.502l5.852 11.5z" fill="#ea4335"/>
            <path d="m43.65 25 13.75-23.8c-1.35-.8-2.9-1.2-4.5-1.2h-18.5c-1.6 0-3.15.45-4.5 1.2z" fill="#00832d"/>
            <path d="m59.8 53h-32.3l-13.75 23.8c1.35.8 2.9 1.2 4.5 1.2h50.8c1.6 0 3.15-.45 4.5-1.2z" fill="#2684fc"/>
            <path d="m73.4 26.5-12.7-22c-.8-1.4-1.95-2.5-3.3-3.3l-13.75 23.8 16.15 28h27.45c0-1.55-.4-3.1-1.2-4.5z" fill="#ffba00"/>
          </svg>
          <div>Google Drive</div>
        </button>
      </div>
    </div>
  </div>

  <div class="rs-box rs-box-sign-in" aria-hidden="true">
    <div class="rs-content">
      <form name="rs-sign-in-form" class="rs-sign-in-form">
        <h1 class="rs-big-headline">Connect your storage</h1>
        <input type="text" name="rs-user-address" placeholder="user@provider.com" autocapitalize="off">
        <div class="rs-sign-in-error rs-hidden"></div>
        <button type="submit" class="rs-connect">Connect</button>
        <a href="https://remotestorage.io/get/" class="rs-help" target="_blank" rel="noopener">Need help?</a>
      </form>
    </div>
  </div>
</div>
